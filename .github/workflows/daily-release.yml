name: Daily Release (06:30 UTC)

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      skip_quality_gates:
        description: 'Skip quality gates for this release'
        required: false
        type: boolean
        default: false
      force_version:
        description: 'Override version (leave empty for date-based)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  issues: write
  actions: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  # ── Version determination ──────────────────────────────────────────────
  prepare:
    name: Determine version & check changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.force_version }}" ]; then
            VER="${{ inputs.force_version }}"
          else
            DATE_VER="v$(date -u +'%Y.%m.%d')"
            # Check if there's already a release today; add counter if so
            EXISTING=$(gh release list --limit 10 2>/dev/null | grep "^$DATE_VER" | wc -l || echo 0)
            if [ "$EXISTING" -gt 0 ]; then
              COUNTER=$((EXISTING + 1))
              VER="${DATE_VER}.${COUNTER}"
            else
              VER="$DATE_VER"
            fi
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "version_tag=$VER" >> $GITHUB_OUTPUT
          echo "release_name=Monthly Budget Manager $VER" >> $GITHUB_OUTPUT
          echo "Daily release version: $VER"

      - name: Check for changes since last release
        id: changes
        run: |
          LAST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            DIFF_COUNT=$(git rev-list --count $LAST_TAG..HEAD 2>/dev/null || echo 0)
            if [ "$DIFF_COUNT" -eq 0 ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "No new commits since $LAST_TAG — will produce no-change release"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "$DIFF_COUNT new commit(s) since $LAST_TAG"
            fi
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "No prior release found; first release"
          fi

  # ── Python CLI tarball ────────────────────────────────────────────────
  build-cli:
    name: CLI tarball
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create CLI tarball
        run: |
          mkdir -p dist
          TARBALL="monthly-budget-manager-cli-${RELEASE_VERSION}.tar.gz"
          tar -czf "dist/$TARBALL" \
            budget_manager.py \
            requirements.txt \
            README.md \
            CHANGELOG.md \
            examples/
          echo "ARTIFACT_CLI=$TARBALL" >> $GITHUB_ENV
          echo "Created CLI tarball: $TARBALL"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-tarball
          path: dist/${{ env.ARTIFACT_CLI }}
          if-no-files-found: error

  # ── Python Desktop (PyInstaller) ──────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconsole --onefile --name BudgetManager budget_manager_gui.py
          $Artifact = "BudgetManager-windows-x64.zip"
          Compress-Archive -Path "dist/BudgetManager.exe" -DestinationPath $Artifact -Force
          echo "ARTIFACT=$Artifact" >> $env:GITHUB_ENV

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --windowed --onefile --name BudgetManager budget_manager_gui.py
          ARTIFACT="BudgetManager-linux-x64.tar.gz"
          tar -C dist -czf "$ARTIFACT" BudgetManager
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --onefile --name BudgetManager budget_manager_gui.py
          ARTIFACT="BudgetManager-macos-arm64.zip"
          (cd dist && zip -9 -r "../$ARTIFACT" BudgetManager)
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  # ── Mobile BeeWare (Android) ──────────────────────────────────────────
  build-mobile:
    name: Mobile BeeWare (Android)
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase==0.3.20

      - name: Build Android APK
        working-directory: mobile
        run: |
          set -e
          briefcase create android -v || echo "briefcase create failed; continuing if project exists"
          briefcase update android -v || echo "briefcase update failed; continuing to build"

          GRADLE_APP="build/budget_manager_mobile/android/gradle/app/build.gradle"
          if [ -f "$GRADLE_APP" ]; then
            if ! grep -q "com.google.android.material:material" "$GRADLE_APP"; then
              echo "Injecting Material dependency into Gradle (app/build.gradle)"
              awk '1;/dependencies\s*\{/ && !x{print "    implementation \"com.google.android.material:material:1.11.0\""; x=1}' "$GRADLE_APP" > "$GRADLE_APP.tmp" && mv "$GRADLE_APP.tmp" "$GRADLE_APP"
            fi
          fi

          briefcase build android -v
          briefcase package android -v
          mkdir -p ../artifacts/mobile
          find build -type f -name "*.apk" -print -exec cp -v {} ../artifacts/mobile/ \; || true
          ls -la ../artifacts/mobile/

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: artifacts/mobile/*
          if-no-files-found: ignore

  # ── React Native Android ─────────────────────────────────────────────
  build-rn-android:
    name: RN Android
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install monorepo dependencies
        working-directory: react-native
        run: npm install --workspaces --include-workspace-root

      - name: Install app dependencies
        working-directory: react-native/apps/mobile
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Build shared packages
        working-directory: react-native
        run: |
          npm run build -w @monthly-budget/shared
          npm run build -w @monthly-budget/adapters

      - name: Make Gradle wrapper executable
        working-directory: react-native/apps/mobile
        run: |
          if [ -d android ] && [ -f android/gradlew ]; then
            chmod +x android/gradlew
          fi

      - name: Build Release APK/AAB
        working-directory: react-native/apps/mobile
        run: |
          if [ -d android ]; then
            cd android
            chmod +x gradlew || true
            ./gradlew --no-daemon assembleRelease bundleRelease -PreactNativeArchitectures=arm64-v8a
          else
            echo "Android project not initialized; skipping"
          fi

      - name: Upload RN Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rn-android-apk
          path: |
            react-native/apps/mobile/android/app/build/outputs/apk/release/**/*.apk
          if-no-files-found: warn

      - name: Upload RN Android AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rn-android-aab
          path: |
            react-native/apps/mobile/android/app/build/outputs/bundle/release/**/*.aab
          if-no-files-found: warn

  # ── React Native iOS ──────────────────────────────────────────────────
  build-rn-ios:
    name: RN iOS
    needs: prepare
    runs-on: macos-13
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install monorepo dependencies
        working-directory: react-native
        run: npm install --workspaces --include-workspace-root

      - name: Install app dependencies
        working-directory: react-native/apps/mobile
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Build shared packages
        working-directory: react-native
        run: |
          npm run build -w @monthly-budget/shared
          npm run build -w @monthly-budget/adapters

      - name: Install CocoaPods
        working-directory: react-native/apps/mobile
        run: |
          if [ -d ios ]; then
            cd ios
            pod install --silent || pod install
          else
            echo "iOS project not initialized; skipping"
          fi

      - name: Build iOS Release archive
        working-directory: react-native/apps/mobile
        run: |
          if [ -d ios ]; then
            xcodebuild -workspace ios/*.xcworkspace -scheme mobile -configuration Release \
              -sdk iphoneos -derivedDataPath build -archivePath build/App.xcarchive archive || true
          else
            echo "iOS project not initialized; skipping"
          fi

      - name: Upload iOS build products
        uses: actions/upload-artifact@v4
        with:
          name: rn-ios-build
          path: react-native/apps/mobile/build/
          if-no-files-found: warn

  # ── React Native Windows ──────────────────────────────────────────────
  build-rn-windows:
    name: RN Windows
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: Install monorepo dependencies
        working-directory: react-native
        shell: pwsh
        run: |
          npm install --workspaces --include-workspace-root

      - name: Install app dependencies
        working-directory: react-native/apps/desktop
        shell: pwsh
        run: |
          if (Test-Path package.json) { npm install }

      - name: Initialize Windows project if missing
        working-directory: react-native/apps/desktop
        shell: pwsh
        run: |
          if (-not (Test-Path windows)) {
            Write-Host "Windows project not found, initializing..."
            npm install react-native@0.74.7 react-native-windows@0.74.46 @babel/runtime@^7.23.0 --no-save --legacy-peer-deps
            npx -y react-native-windows-init@latest --overwrite --no-telemetry
            if (Test-Path windows) {
              Write-Host "Windows project created successfully"
            } else {
              Write-Host "Warning: Windows project directory not created"
            }
          }

      - name: Restore metro.config.js
        working-directory: react-native/apps/desktop
        shell: pwsh
        run: |
          git -C $env:GITHUB_WORKSPACE checkout HEAD -- react-native/apps/desktop/metro.config.js

      - name: Build shared packages
        working-directory: react-native
        shell: pwsh
        run: |
          npm run build -w @monthly-budget/shared
          npm run build -w @monthly-budget/adapters

      - name: Package Windows Release
        working-directory: react-native/apps/desktop
        shell: pwsh
        run: |
          if (Test-Path windows) {
            $sln = Get-ChildItem -Path .\windows -Filter *.sln -File -Recurse | Select-Object -First 1
            if ($null -ne $sln) {
              nuget restore $sln.FullName -NonInteractive
              $availableSDK = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
              msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:UapAppxPackageBuildMode=SideloadOnly /m /p:RestorePackagesConfig=true /p:WindowsTargetPlatformVersion=$availableSDK
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rn-windows-build
          path: |
            react-native/apps/desktop/windows/**/AppPackages/**/*
          if-no-files-found: warn

  # ── React Native macOS ────────────────────────────────────────────────
  build-rn-macos:
    name: RN macOS
    needs: prepare
    runs-on: macos-13
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install monorepo dependencies
        working-directory: react-native
        run: npm install --workspaces --include-workspace-root

      - name: Install app dependencies
        working-directory: react-native/apps/desktop
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Initialize macOS project if missing
        working-directory: react-native/apps/desktop
        run: |
          if [ ! -d macos ]; then
            echo "macOS project not found. Skipping macOS build."
            mkdir -p macos
            echo "# macOS build temporarily disabled" > macos/README.md
          fi

      - name: Install CocoaPods
        working-directory: react-native/apps/desktop
        run: |
          if [ -d macos ] && [ -f macos/Podfile ]; then
            npm install react-native-macos@0.74.37 @babel/runtime@^7.23.0 --no-save --legacy-peer-deps
            cd macos
            pod install --silent || pod install --verbose
          fi

      - name: Build macOS Release
        working-directory: react-native/apps/desktop
        run: |
          if [ -d macos ] && [ -f macos/Podfile ]; then
            xcodebuild -workspace macos/*.xcworkspace -scheme desktop -configuration Release -derivedDataPath build || true
          fi

      - name: Zip macOS app
        working-directory: react-native/apps/desktop
        run: |
          mkdir -p build-zips
          if compgen -G "build/Build/Products/Release/*.app" > /dev/null; then
            (cd build/Build/Products/Release && for app in *.app; do zip -r "../../../../build-zips/${app%.app}-Release-macos.zip" "$app" >/dev/null; done)
          fi

      - name: Upload macOS build products
        uses: actions/upload-artifact@v4
        with:
          name: rn-macos-build
          path: |
            react-native/apps/desktop/build-zips/*.zip
          if-no-files-found: warn

  # ── Web build and test ────────────────────────────────────────────────
  build-web:
    name: Web build
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run web tests
        working-directory: web
        run: npm test

      - name: Package web artifact
        working-directory: web
        run: |
          mkdir -p ../dist/web
          # Include all web assets in a deployable bundle
          cp -r index.html script.js tour.js i18n.js package.json \
            public/ __tests__/ scripts/ evidence/ \
            ../dist/web/ 2>/dev/null || true
          cd ../dist
          WEB_TARBALL="monthly-budget-manager-web-${RELEASE_VERSION}.tar.gz"
          tar -czf "$WEB_TARBALL" web/
          echo "WEB_ARTIFACT=$WEB_TARBALL" >> $GITHUB_ENV

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/${{ env.WEB_ARTIFACT }}
          if-no-files-found: error

  # ── Quality gates (runs in parallel with builds) ──────────────────────
  quality-gates:
    name: Quality gates
    needs: prepare
    if: ${{ !inputs.skip_quality_gates }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint (ruff)
        run: ruff check budget_manager.py budget_manager_gui.py tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=budget_manager \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r budget_manager.py budget_manager_gui.py -ll 2>&1 || echo "::warning::Bandit found issues"

  # ── Create unified GitHub Release ─────────────────────────────────────
  release:
    name: Create release
    needs: [prepare, build-cli, build-desktop, build-mobile, build-rn-android, build-rn-ios, build-rn-windows, build-rn-macos, build-web, quality-gates]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      HAS_CHANGES: ${{ needs.prepare.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p assets
          find release-artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.apk" -o -name "*.aab" \) \
            -exec cp {} assets/ \; 2>/dev/null || true
          echo "Release assets:"
          ls -la assets/ || true
          COUNT=$(ls -1 assets/ 2>/dev/null | wc -l)
          echo "asset_count=$COUNT" >> $GITHUB_ENV

      - name: Generate release notes
        id: notes
        run: |
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "## Changes since last release" > release-notes.md
            LAST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              echo "" >> release-notes.md
              git log --oneline $LAST_TAG..HEAD >> release-notes.md 2>/dev/null || true
            else
              echo "- Initial release" >> release-notes.md
            fi
          else
            echo "## No shippable changes" > release-notes.md
            echo "" >> release-notes.md
            echo "Re-published with updated date stamp. No user-facing changes since previous release." >> release-notes.md
          fi
          echo "" >> release-notes.md
          echo "### Artifacts" >> release-notes.md
          ls -1 assets/ 2>/dev/null | while read f; do
            echo "- $f" >> release-notes.md
          done
          cat release-notes.md

      - name: Create GitHub Release
        if: env.asset_count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Monthly Budget Manager ${{ env.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: assets/*

      - name: Report no artifacts
        if: env.asset_count == '0'
        run: |
          echo "::warning::No build artifacts found. All build jobs may have failed."
          echo "Check upstream jobs for errors."

  # ── Auto-generate changelog entry ─────────────────────────────────────
  changelog:
    name: Update changelog
    needs: [prepare, release]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      HAS_CHANGES: ${{ needs.prepare.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog entry
        run: |
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "## [$VERSION] - $(date -u +'%Y-%m-%d')" > /tmp/changelog-entry.txt
            echo "" >> /tmp/changelog-entry.txt
          else
            echo "## [$VERSION] - $(date -u +'%Y-%m-%d')" > /tmp/changelog-entry.txt
            echo "" >> /tmp/changelog-entry.txt
            echo "- No shippable change — re-published with updated date stamp." >> /tmp/changelog-entry.txt
          fi

          if grep -q '## \[Unreleased\]' CHANGELOG.md; then
            sed -i '/## \[Unreleased\]/r /tmp/changelog-entry.txt' CHANGELOG.md
            echo "Added changelog entry for $VERSION"
          else
            echo "::notice::No [Unreleased] section found in CHANGELOG.md; prepending"
            cat /tmp/changelog-entry.txt CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi
          cat CHANGELOG.md | head -30

      - name: Commit changelog update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
          else
            git commit -m "chore: update changelog for $VERSION [skip ci]"
            git push origin HEAD:main
          fi

  # ── Notify QA ─────────────────────────────────────────────────────────
  notify-qa:
    name: Create QA validation issue
    needs: [prepare, release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create QA validation issue
        run: |
          gh issue create \
            --title "[QA Validation] Daily release $VERSION" \
            --body "## Daily Release Validation — $VERSION

          **Release**: [Monthly Budget Manager $VERSION](https://github.com/anubisland/Monthly-Budget-Manager/releases/tag/$VERSION)

          ### Artifacts to validate
          - [ ] CLI tarball — extract and run \`python budget_manager.py --help\`
          - [ ] Desktop builds — Windows, Linux, macOS
          - [ ] Mobile (BeeWare) — Android APK install and smoke
          - [ ] React Native — Android APK, iOS archive, Windows, macOS
          - [ ] Web — deploy and smoke test

          ### Validation steps
          1. Download each artifact from the release
          2. Install/run on target platform
          3. Verify core features: add income, add expense, view report, export
          4. Check i18n toggle (English/Arabic)
          5. Note any issues in this issue comments

          Auto-filed by \`daily-release.yml\` workflow." \
            --label "qa" \
            --label "release-validation"

      - name: Post summary comment
        run: |
          gh release view "$VERSION" --json url -q '.url' 2>/dev/null || true

  # ── Notify ────────────────────────────────────────────────────────────
  notify:
    name: Release notification
    needs: [prepare, release]
    if: always() && needs.prepare.result == 'success'
    uses: anubisland/.github/.github/workflows/reusable-release-notify.yml@main
    with:
      release-tag: ${{ needs.prepare.outputs.version }}
      release-name: ${{ needs.prepare.outputs.release_name }}
    secrets: inherit
